name: veloria-cs2-dumper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: "Пересобрать даже если buildid не изменился (--force)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  RUST_BACKTRACE: "1"

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Wait for GitHub API
        run: |
          check() {
            curl -s -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}
          }
          i=0
          for w in 5 10 15 30; do
            i=$((i+1))
            code=$(check)
            [ "$code" = "200" ] && echo "✓ ready (attempt $i)" && exit 0
            echo "HTTP $code — retry in ${w}s (attempt $i)"
            sleep $w
          done
          deadline=$((SECONDS + 1800))
          while [ $SECONDS -lt $deadline ]; do
            i=$((i+1))
            code=$(check)
            [ "$code" = "200" ] && echo "✓ ready (attempt $i)" && exit 0
            echo "HTTP $code — retry in 60s (attempt $i)"
            sleep 60
          done
          exit 1

      - name: Checkout veloria-cs2-dumper (this repo, output)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: _src

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('_src/**/*.lock') }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "_src/${{ secrets.DUMPER_PATH }} -> target"
          cache-on-failure: true

      - name: Run dumper
        working-directory: _src/${{ secrets.DUMPER_PATH }}
        run: |
          FORCE=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
          fi
          cargo run --profile dumper --bin veloria-cs2-dumper -- \
            --tmp "$RUNNER_TEMP/cs2_depot" \
            --output "$GITHUB_WORKSPACE" \
            $FORCE

      - name: Check patterns and dump offsets
        working-directory: _src/${{ secrets.DUMPER_PATH }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_PATTERN_WEBHOOK }}
        run: |
          # Read Steam credentials from config.json (same source the main dumper binary uses)
          STEAM_USERNAME=$(node -e "const c=JSON.parse(require('fs').readFileSync('config.json','utf8'));process.stdout.write(c.username)")
          STEAM_REFRESH_TOKEN=$(node -e "const c=JSON.parse(require('fs').readFileSync('config.json','utf8'));process.stdout.write(c.refresh_token||'')")
          echo "::add-mask::$STEAM_REFRESH_TOKEN"
          export STEAM_USERNAME STEAM_REFRESH_TOKEN
          cargo build --profile dumper --bin pattern-check --bin dump-offsets 2>&1
          ./target/dumper/pattern-check --from-steam || true
          BUILDID=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/manifest.json','utf8')).buildid)}catch{console.log(0)}" 2>/dev/null || echo 0)
          ./target/dumper/dump-offsets --from-steam --output "$GITHUB_WORKSPACE/offsets" --buildid "$BUILDID"

      - name: Commit updated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json manifest.js maps/ characters/ icons/ offsets/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Нет изменений — buildid не изменился"
          else
            BUILDID=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).buildid)}catch{console.log('?')}" 2>/dev/null || echo "?")
            git commit -m "chore: cs2 assets update (buildid=${BUILDID}) [skip ci]"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cs2-templates-${{ github.run_number }}
          path: |
            manifest.json
            maps/
          if-no-files-found: warn
